name: TCT Alert Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes (UTC). GitHub may delay a few min.
  workflow_dispatch: {}        # adds a manual "Run workflow" button for testing

permissions:
  contents: write              # needed so the bot can save state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run the bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tct_bot.py

      - name: Save state (so we don't re-alert the same setup)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "tct-bot"
            git config user.email "tct-bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "No state change."
          fi
